[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rebalance"
version = "0.1"
description = "A calculator which tells you how to split your investment amongst your portfolio's assets based on your target asset allocation."
readme = "README.rst"
requires-python = ">=3.11"
authors = [
    {name = "Karl Lundgren", email = "k.github@lundgrens.net"},
]
dependencies = [
    "beautifulsoup4>=4.12.2",
    "CurrencyConverter>=0.18.8",
    "forex-python>=1.9.2",
    "lxml>=4.9.3",
    "numpy>=1.26.1",
    "pandas>=1.5.3",
    "python-dateutil>=2.8.1",
    "requests>=2.31.0",
    "requests-cache>=1.1.0",
    "scipy>=1.11.3",
    "yfinance>=0.2.65",
    "pydantic>=2.0",
    "rich>=13.0",
]

[project.urls]
Homepage = "https://github.com/kallegrens/rebalance"

[project.scripts]
rebalance = "rebalance.__main__:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "ty>=0.0.34",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ty.analysis]
allowed-unresolved-imports = [
    "bs4",
    "currency_converter",
    "forex_python",
    "requests_cache",
    "scipy",
    "yfinance",
]

[tool.coverage.run]
source = ["rebalance"]
omit = ["rebalance/tests/*"]

[tool.coverage.report]
show_missing = true
