---
name: Lint

"on":
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          version: "latest"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install prek
        env:
          # renovate: datasource=github-releases depName=j178/prek
          PREK_VERSION: "0.3.13"
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/j178/prek/releases/download/v${PREK_VERSION}/prek-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin prek

      - name: Run linters
        run: uv run just lint

  actionlint:
    name: GitHub Actions Syntax
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout repository code
      pull-requests: write # Required for reviewdog to post PR review comments
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@e58ee9d111489c31395fbe4857b0be6e7635dbda # v1.70.0
        with:
          reporter: github-pr-review
          github_token: ${{ secrets.GITHUB_TOKEN }}

  zizmor:
    name: Security Audit with zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF file to GitHub Security
      contents: read # Required to checkout repository code
      actions: read # Required to read workflow and action metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
