[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff lint"
language = "system"
entry = "uv run ruff check --fix"
files = "\\.py$"

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
language = "system"
entry = "uv run ruff format"
files = "\\.py$"

[[repos.hooks]]
id = "ty"
name = "ty type check"
language = "system"
entry = "uv run ty check"
files = "\\.py$"
pass_filenames = false
